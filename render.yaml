services:
  - type: web
    name: college-erp-backend
    runtime: python

    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"

    envVars:
      - key: DEBUG
        value: "False"

      - key: SECRET_KEY
        generateValue: true

      - key: DATABASE_URL
        fromDatabase:
          name: college-erp-db
          property: connectionString

      - key: ALLOWED_HOSTS
        value: "college-erp-backend.onrender.com"

      - key: CORS_ALLOWED_ORIGINS
        value: "https://college-erp-frontend.vercel.app"

      - key: CSRF_TRUSTED_ORIGINS
        value: "https://college-erp-frontend.vercel.app"

databases:
  - name: college-erp-db